version: "3.9"

services:
  web:
    build: .
    container_name: website_php
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html

    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: website_mysql

    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: perpustakaan_db
      
    ports:
      - "3306:3306"
    volumes:
      - ./data:/var/lib/mysql
  